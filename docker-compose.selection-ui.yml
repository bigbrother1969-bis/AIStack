services:
  aistack-selection-ui:
    image: aistack-selection-ui:latest
    container_name: aistack-selection-ui
    # Build is disabled until Docker buildx is upgraded.
    # Image must be built manually with:
    # docker build -f Dockerfile.selection-ui -t aistack-selection-ui:latest .
    ports:
      - "8181:8181"
    volumes:
      - /srv/aistack/AISTack:/app
      - /media/TechData:/media/TechData
    working_dir: /app
    env_file:
      - .env.selection-ui
    networks:
      - proxy
    restart: unless-stopped

networks:
  proxy:
    external: true
